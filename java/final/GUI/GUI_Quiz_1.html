<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Java GUI · Interactive Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0d0f14;
  --surface: #161920;
  --surface2: #1e2230;
  --border: #2a2f40;
  --accent: #4f9eff;
  --accent2: #7c4dff;
  --green: #22c55e;
  --red: #ef4444;
  --yellow: #f59e0b;
  --text: #e8eaf0;
  --muted: #7b82a0;
  --easy: #22c55e;
  --med: #f59e0b;
  --hard: #ef4444;
  --lec5: #4f9eff;
  --lec6: #a855f7;
  --lec7: #f97316;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* Grid background */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(rgba(79,158,255,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(79,158,255,.04) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events:none;
  z-index:0;
}

/* ── HEADER ── */
.header {
  position: relative;
  z-index:10;
  padding: 48px 40px 32px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, #0d1520 0%, transparent 100%);
}
.header-inner { max-width:1100px; margin:0 auto; }
.badge {
  display:inline-block;
  font-family:'Space Mono', monospace;
  font-size:10px;
  letter-spacing:.15em;
  text-transform:uppercase;
  color: var(--accent);
  border: 1px solid rgba(79,158,255,.3);
  padding: 4px 10px;
  border-radius: 2px;
  margin-bottom:16px;
}
h1 {
  font-size: clamp(28px, 5vw, 52px);
  font-weight:700;
  line-height:1.1;
  letter-spacing: -0.02em;
}
h1 span { color: var(--accent); }
.subtitle {
  margin-top:10px;
  color: var(--muted);
  font-size:15px;
  font-weight:300;
}
.stats-row {
  display:flex;
  gap:32px;
  margin-top:28px;
  flex-wrap:wrap;
}
.stat {
  display:flex;
  flex-direction:column;
  gap:2px;
}
.stat-val {
  font-family:'Space Mono',monospace;
  font-size:22px;
  font-weight:700;
  color: var(--accent);
}
.stat-lbl { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }

/* ── SCORE BAR ── */
.score-bar {
  position:sticky;
  top:0;
  z-index:100;
  background: rgba(13,15,20,.95);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 12px 40px;
  display:flex;
  align-items:center;
  gap:24px;
  flex-wrap:wrap;
}
.score-pill {
  font-family:'Space Mono',monospace;
  font-size:13px;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid;
  white-space:nowrap;
}
.score-pill.correct { color:var(--green); border-color:rgba(34,197,94,.3); background:rgba(34,197,94,.08); }
.score-pill.wrong   { color:var(--red);   border-color:rgba(239,68,68,.3);  background:rgba(239,68,68,.08);  }
.score-pill.skipped { color:var(--yellow);border-color:rgba(245,158,11,.3); background:rgba(245,158,11,.08); }
.progress-wrap { flex:1; min-width:140px; }
.progress-track { height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
.progress-fill  { height:100%; background: linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:2px; transition: width .4s ease; }
.progress-lbl   { font-size:11px; color:var(--muted); margin-top:4px; font-family:'Space Mono',monospace; }
.reset-btn {
  margin-left:auto;
  font-family:'Space Mono',monospace;
  font-size:11px;
  letter-spacing:.1em;
  padding: 6px 14px;
  border: 1px solid var(--border);
  background:transparent;
  color:var(--muted);
  border-radius:3px;
  cursor:pointer;
  transition: all .2s;
  text-transform:uppercase;
}
.reset-btn:hover { border-color:var(--accent); color:var(--accent); }

/* ── MAIN LAYOUT ── */
.main { max-width:1100px; margin:0 auto; padding:40px; position:relative; z-index:5; }

/* ── LECTURE TABS ── */
.lecture-tabs {
  display:flex;
  gap:8px;
  margin-bottom:36px;
  flex-wrap:wrap;
}
.tab-btn {
  font-family:'Space Mono',monospace;
  font-size:12px;
  letter-spacing:.08em;
  padding: 10px 20px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  transition: all .2s;
  text-transform:uppercase;
  position:relative;
  overflow:hidden;
}
.tab-btn::before {
  content:'';
  position:absolute;
  bottom:0; left:0; right:0;
  height:2px;
  background: currentColor;
  transform: scaleX(0);
  transition: transform .2s;
}
.tab-btn:hover { background:var(--surface2); color:var(--text); }
.tab-btn.active { background:var(--surface2); border-color:var(--tab-color, var(--accent)); color:var(--tab-color, var(--accent)); }
.tab-btn.active::before { transform: scaleX(1); }
.tab-btn[data-lec="all"] { --tab-color: var(--accent); }
.tab-btn[data-lec="5"]   { --tab-color: var(--lec5); }
.tab-btn[data-lec="6"]   { --tab-color: var(--lec6); }
.tab-btn[data-lec="7"]   { --tab-color: var(--lec7); }

/* ── DIFFICULTY FILTER ── */
.filter-row {
  display:flex;
  gap:8px;
  margin-bottom:28px;
  flex-wrap:wrap;
  align-items:center;
}
.filter-lbl { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; margin-right:4px; font-family:'Space Mono',monospace; }
.diff-btn {
  font-size:11px;
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all .2s;
  font-family:'Space Mono',monospace;
  letter-spacing:.06em;
  text-transform:uppercase;
}
.diff-btn:hover { background:var(--surface2); }
.diff-btn.active[data-diff="easy"]   { color:var(--easy); border-color:rgba(34,197,94,.4); background:rgba(34,197,94,.08); }
.diff-btn.active[data-diff="medium"] { color:var(--med);  border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.08);}
.diff-btn.active[data-diff="hard"]   { color:var(--hard); border-color:rgba(239,68,68,.4); background:rgba(239,68,68,.08); }
.diff-btn.active[data-diff="all"]    { color:var(--accent);border-color:rgba(79,158,255,.4);background:rgba(79,158,255,.08);}

/* ── TYPE FILTER ── */
.type-row {
  display:flex;
  gap:8px;
  margin-bottom:36px;
  flex-wrap:wrap;
  align-items:center;
}
.type-btn {
  font-size:11px;
  padding: 5px 14px;
  border-radius: 3px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all .2s;
  font-family:'Space Mono',monospace;
  letter-spacing:.06em;
  text-transform:uppercase;
}
.type-btn.active { color:var(--text); border-color:var(--accent); background:rgba(79,158,255,.08); }
.type-btn:hover { background:var(--surface2); }

/* ── SECTION HEADER ── */
.section-header {
  display:flex;
  align-items:center;
  gap:12px;
  margin: 40px 0 20px;
}
.section-dot {
  width:10px; height:10px;
  border-radius:50%;
  flex-shrink:0;
}
.section-title {
  font-family:'Space Mono',monospace;
  font-size:12px;
  letter-spacing:.15em;
  text-transform:uppercase;
  color:var(--muted);
}
.section-line { flex:1; height:1px; background:var(--border); }
.section-count {
  font-family:'Space Mono',monospace;
  font-size:11px;
  color:var(--muted);
}

/* ── QUESTION CARD ── */
.q-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 28px 28px 24px;
  margin-bottom: 16px;
  transition: border-color .2s, transform .15s;
  position:relative;
  overflow:hidden;
}
.q-card::before {
  content:'';
  position:absolute;
  top:0; left:0;
  width:3px; height:100%;
  background: var(--lec-color, var(--accent));
  border-radius:3px 0 0 3px;
}
.q-card:hover { border-color:var(--surface2); transform: translateY(-1px); }
.q-card.answered-correct { border-color: rgba(34,197,94,.3); background: rgba(34,197,94,.04); }
.q-card.answered-wrong   { border-color: rgba(239,68,68,.3);  background: rgba(239,68,68,.04);  }
.q-card.answered-essay   { border-color: rgba(79,158,255,.3); background: rgba(79,158,255,.04); }

.q-meta {
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:14px;
  flex-wrap:wrap;
}
.q-num {
  font-family:'Space Mono',monospace;
  font-size:11px;
  color:var(--muted);
}
.q-lec-tag {
  font-size:10px;
  padding: 2px 8px;
  border-radius:2px;
  font-family:'Space Mono',monospace;
  letter-spacing:.08em;
  text-transform:uppercase;
  font-weight:700;
}
.q-diff-tag {
  font-size:10px;
  padding: 2px 8px;
  border-radius:10px;
  font-family:'Space Mono',monospace;
  letter-spacing:.06em;
  text-transform:uppercase;
}
.diff-easy   { color:var(--easy); background:rgba(34,197,94,.1); }
.diff-medium { color:var(--med);  background:rgba(245,158,11,.1);}
.diff-hard   { color:var(--hard); background:rgba(239,68,68,.1); }

.q-type-tag {
  font-size:10px;
  padding: 2px 8px;
  border-radius:2px;
  font-family:'Space Mono',monospace;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--muted);
  border: 1px solid var(--border);
}
.status-icon {
  margin-left:auto;
  font-size:16px;
}

.q-text {
  font-size:15px;
  font-weight:500;
  line-height:1.6;
  margin-bottom:18px;
  color:var(--text);
}
.q-text code {
  font-family:'Space Mono',monospace;
  font-size:13px;
  background: rgba(79,158,255,.1);
  padding:1px 5px;
  border-radius:3px;
  color:var(--accent);
}

/* ── MCQ OPTIONS ── */
.options { display:flex; flex-direction:column; gap:8px; }
.option {
  display:flex;
  align-items:flex-start;
  gap:12px;
  padding: 12px 16px;
  border: 1px solid var(--border);
  border-radius: 6px;
  cursor: pointer;
  transition: all .15s;
  background: var(--surface2);
  font-size:14px;
  line-height:1.5;
}
.option:hover:not(.disabled) { border-color:var(--accent); background:rgba(79,158,255,.06); }
.option.selected-correct { border-color:var(--green); background:rgba(34,197,94,.1); color:var(--green); }
.option.selected-wrong   { border-color:var(--red);   background:rgba(239,68,68,.1);  color:var(--red);   }
.option.correct-reveal   { border-color:var(--green); background:rgba(34,197,94,.06); color:var(--green); }
.option.disabled         { cursor:default; }
.opt-letter {
  font-family:'Space Mono',monospace;
  font-size:11px;
  font-weight:700;
  min-width:20px;
  padding-top:1px;
  color:var(--muted);
}
.option.selected-correct .opt-letter,
.option.correct-reveal .opt-letter { color:var(--green); }
.option.selected-wrong .opt-letter  { color:var(--red); }

/* ── T/F BUTTONS ── */
.tf-buttons { display:flex; gap:10px; }
.tf-btn {
  flex:1;
  padding: 14px;
  border-radius:6px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--muted);
  font-family:'Space Mono',monospace;
  font-size:13px;
  font-weight:700;
  letter-spacing:.1em;
  cursor:pointer;
  transition: all .15s;
  text-transform:uppercase;
}
.tf-btn:hover:not(.disabled) { border-color:var(--accent); color:var(--accent); background:rgba(79,158,255,.06); }
.tf-btn.selected-correct { border-color:var(--green); background:rgba(34,197,94,.12); color:var(--green); }
.tf-btn.selected-wrong   { border-color:var(--red);   background:rgba(239,68,68,.12); color:var(--red);   }
.tf-btn.correct-reveal   { border-color:var(--green); background:rgba(34,197,94,.06); color:var(--green); }
.tf-btn.disabled { cursor:default; }

/* ── ESSAY ── */
.essay-area {
  width:100%;
  min-height:100px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius:6px;
  color: var(--text);
  font-family:'DM Sans',sans-serif;
  font-size:14px;
  padding:14px 16px;
  resize:vertical;
  outline:none;
  transition: border-color .2s;
  line-height:1.6;
}
.essay-area:focus { border-color:var(--accent); }
.essay-submit {
  margin-top:10px;
  padding: 8px 20px;
  background: rgba(79,158,255,.1);
  border: 1px solid rgba(79,158,255,.3);
  color: var(--accent);
  border-radius:4px;
  font-family:'Space Mono',monospace;
  font-size:11px;
  letter-spacing:.1em;
  text-transform:uppercase;
  cursor:pointer;
  transition:all .2s;
}
.essay-submit:hover { background:rgba(79,158,255,.2); }

/* ── CODE BLOCK ── */
.code-block {
  background: #0a0c10;
  border: 1px solid var(--border);
  border-radius:6px;
  padding: 16px 20px;
  margin-bottom:16px;
  font-family:'Space Mono',monospace;
  font-size:12.5px;
  line-height:1.7;
  color:#c9d1d9;
  overflow-x:auto;
  white-space:pre;
}
.code-kw   { color:#ff7b72; }
.code-type { color:#79c0ff; }
.code-str  { color:#a5d6ff; }
.code-cmt  { color:#6e7681; font-style:italic; }
.code-num  { color:#f2cc60; }

/* ── ANSWER REVEAL ── */
.answer-reveal {
  margin-top:14px;
  padding: 12px 16px;
  background: rgba(34,197,94,.06);
  border: 1px solid rgba(34,197,94,.2);
  border-radius:6px;
  font-size:13px;
  line-height:1.6;
  color:#86efac;
  display:none;
}
.answer-reveal.show { display:block; }
.answer-reveal strong { color:var(--green); font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase; display:block; margin-bottom:6px; }

/* ── EMPTY STATE ── */
.empty-state {
  text-align:center;
  padding:80px 40px;
  color:var(--muted);
}
.empty-state .empty-icon { font-size:48px; margin-bottom:16px; opacity:.4; }
.empty-state p { font-size:14px; }

/* ── ANIMATIONS ── */
@keyframes fadeSlideIn {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}
.q-card { animation: fadeSlideIn .25s ease both; }
.q-card:nth-child(2)  { animation-delay:.03s; }
.q-card:nth-child(3)  { animation-delay:.06s; }
.q-card:nth-child(4)  { animation-delay:.09s; }
.q-card:nth-child(5)  { animation-delay:.12s; }
.q-card:nth-child(6)  { animation-delay:.14s; }

/* ── FINAL SCORE MODAL ── */
.modal-overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  backdrop-filter:blur(8px);
  z-index:1000;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:opacity .3s;
}
.modal-overlay.show { opacity:1; pointer-events:all; }
.modal {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:48px;
  max-width:440px;
  width:90%;
  text-align:center;
  transform:scale(.9);
  transition:transform .3s;
}
.modal-overlay.show .modal { transform:scale(1); }
.modal-score {
  font-family:'Space Mono',monospace;
  font-size:72px;
  font-weight:700;
  color:var(--accent);
  line-height:1;
  margin:16px 0;
}
.modal-grade { font-size:24px; font-weight:600; margin-bottom:8px; }
.modal-sub   { color:var(--muted); font-size:14px; margin-bottom:28px; }
.modal-close {
  padding:12px 32px;
  background:rgba(79,158,255,.12);
  border:1px solid rgba(79,158,255,.3);
  color:var(--accent);
  border-radius:6px;
  font-family:'Space Mono',monospace;
  font-size:12px;
  letter-spacing:.1em;
  text-transform:uppercase;
  cursor:pointer;
  transition:all .2s;
}
.modal-close:hover { background:rgba(79,158,255,.25); }

/* ── TOOLTIP ── */
.tooltip-wrap { position:relative; display:inline-block; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-inner">
    <div class="badge">CS Faculty · Level 2 · Java GUI</div>
    <h1>Java <span>GUI</span> / Swing / AWT<br>Interactive Quiz</h1>
    <p class="subtitle">Lectures 5 · 6 · 7 — Components, Events, Layout Managers</p>
    <div class="stats-row">
      <div class="stat"><span class="stat-val" id="totalQs">83</span><span class="stat-lbl">Questions</span></div>
      <div class="stat"><span class="stat-val" id="lecCount">3</span><span class="stat-lbl">Lectures</span></div>
      <div class="stat"><span class="stat-val">4</span><span class="stat-lbl">Types</span></div>
      <div class="stat"><span class="stat-val">3</span><span class="stat-lbl">Difficulty Levels</span></div>
    </div>
  </div>
</div>

<!-- SCORE BAR -->
<div class="score-bar">
  <div class="score-pill correct">✓ <span id="correctCount">0</span> Correct</div>
  <div class="score-pill wrong">✗ <span id="wrongCount">0</span> Wrong</div>
  <div class="score-pill skipped">◌ <span id="essayCount">0</span> Essay</div>
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-lbl"><span id="progressText">0 / 83</span> answered</div>
  </div>
  <button class="reset-btn" onclick="resetAll()">↺ Reset</button>
  <button class="reset-btn" style="color:var(--green);border-color:rgba(34,197,94,.3)" onclick="showScore()">Score</button>
</div>

<!-- MAIN -->
<div class="main">

  <!-- LECTURE TABS -->
  <div class="lecture-tabs">
    <button class="tab-btn active" data-lec="all" onclick="setLec('all',this)">All Lectures</button>
    <button class="tab-btn" data-lec="5" onclick="setLec('5',this)">Lecture 5 · GUI Part 1</button>
    <button class="tab-btn" data-lec="6" onclick="setLec('6',this)">Lecture 6 · GUI Part 2</button>
    <button class="tab-btn" data-lec="7" onclick="setLec('7',this)">Lecture 7 · Layout Managers</button>
  </div>

  <!-- DIFFICULTY FILTER -->
  <div class="filter-row">
    <span class="filter-lbl">Difficulty:</span>
    <button class="diff-btn active" data-diff="all" onclick="setDiff('all',this)">All</button>
    <button class="diff-btn" data-diff="easy" onclick="setDiff('easy',this)">Easy</button>
    <button class="diff-btn" data-diff="medium" onclick="setDiff('medium',this)">Medium</button>
    <button class="diff-btn" data-diff="hard" onclick="setDiff('hard',this)">Hard</button>
  </div>

  <!-- TYPE FILTER -->
  <div class="type-row">
    <span class="filter-lbl">Type:</span>
    <button class="type-btn active" data-type="all" onclick="setType('all',this)">All</button>
    <button class="type-btn" data-type="mcq" onclick="setType('mcq',this)">MCQ</button>
    <button class="type-btn" data-type="tf" onclick="setType('tf',this)">True / False</button>
    <button class="type-btn" data-type="essay" onclick="setType('essay',this)">Essay</button>
    <button class="type-btn" data-type="code" onclick="setType('code',this)">Coding</button>
  </div>

  <!-- QUIZ AREA -->
  <div id="quizArea"></div>

</div>

<!-- SCORE MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div style="font-size:13px;color:var(--muted);font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:.1em">Your Score</div>
    <div class="modal-score" id="modalScore">0%</div>
    <div class="modal-grade" id="modalGrade">—</div>
    <div class="modal-sub" id="modalSub"></div>
    <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('show')">Close</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  QUESTION DATA
// ═══════════════════════════════════════════════════════
const QUESTIONS = [

// ─── LECTURE 5 · MCQ · EASY ───
{id:1, lec:5, type:'mcq', diff:'easy',
 text:'Which package contains Java Swing GUI components?',
 opts:['java.awt','javax.swing','java.gui','java.swing'],
 ans:1},

{id:2, lec:5, type:'mcq', diff:'easy',

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let state = {
  answers: {},     // qId -> { correct: bool, essay: bool }
  lec: 'all',
  diff: 'all',
  type: 'all'
};

const LECColors = { 5:'#4f9eff', 6:'#a855f7', 7:'#f97316' };
const LECNames  = { 5:'LEC 5', 6:'LEC 6', 7:'LEC 7' };

// ═══════════════════════════════════════════════════════
//  FILTERS
// ═══════════════════════════════════════════════════════
function setLec(v, btn) {
  state.lec = v;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function setDiff(v, btn) {
  state.diff = v;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function setType(v, btn) {
  state.type = v;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function filteredQs() {
  return QUESTIONS.filter(q => {
    if (state.lec  !== 'all' && q.lec  !== parseInt(state.lec))  return false;
    if (state.diff !== 'all' && q.diff !== state.diff)             return false;
    if (state.type !== 'all' && q.type !== state.type)             return false;
    return true;
  });
}

// ═══════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════
function render() {
  const qs = filteredQs();
  const area = document.getElementById('quizArea');

  if (!qs.length) {
    area.innerHTML = `<div class="empty-state"><div class="empty-icon">◌</div><p>No questions match the selected filters.</p></div>`;
    updateScoreBar();
    return;
  }

  // Group by: lecture → type
  const groups = {};
  qs.forEach(q => {
    const k = `lec${q.lec}_${q.type}`;
    if (!groups[k]) groups[k] = { lec:q.lec, type:q.type, qs:[] };
    groups[k].qs.push(q);
  });

  const typeLabel = { mcq:'Multiple Choice', tf:'True / False', essay:'Essay', code:'Coding' };
  const typeIcon  = { mcq:'◈', tf:'◉', essay:'◎', code:'⌘' };

  let html = '';
  const sortedKeys = Object.keys(groups).sort();
  sortedKeys.forEach(key => {
    const g = groups[key];
    const col = LECColors[g.lec] || '#4f9eff';
    html += `
      <div class="section-header">
        <div class="section-dot" style="background:${col}"></div>
        <div class="section-title">${LECNames[g.lec]} · ${typeLabel[g.type]}</div>
        <div class="section-line"></div>
        <div class="section-count">${g.qs.length}q</div>
      </div>`;
    g.qs.forEach(q => { html += renderCard(q, col); });
  });

  area.innerHTML = html;
  updateScoreBar();
}

function renderCard(q, col) {
  const s = state.answers[q.id];
  let cardClass = '';
  if (s) {
    if (s.essay) cardClass = 'answered-essay';
    else if (s.correct) cardClass = 'answered-correct';
    else cardClass = 'answered-wrong';
  }

  const statusIcon = s
    ? (s.essay ? '📝' : s.correct ? '✅' : '❌')
    : '';

  const diffCls   = `diff-${q.diff}`;
  const typeLabel = { mcq:'MCQ', tf:'T/F', essay:'Essay', code:'Code' };
  const typeIcon  = { mcq:'◈', tf:'◉', essay:'◎', code:'⌘' };

  let body = '';

  if (q.type === 'mcq') {
    body = renderMCQ(q, s);
  } else if (q.type === 'tf') {
    body = renderTF(q, s);
  } else if (q.type === 'essay') {
    body = renderEssay(q, s);
  } else if (q.type === 'code') {
    body = renderCode(q, s);
  }

  return `
  <div class="q-card ${cardClass}" id="card${q.id}" style="--lec-color:${col}">
    <div class="q-meta">
      <span class="q-num">#${q.id}</span>
      <span class="q-lec-tag" style="color:${col};background:${col}18">${LECNames[q.lec]}</span>
      <span class="q-diff-tag ${diffCls}">${q.diff}</span>
      <span class="q-type-tag">${typeIcon[q.type]} ${typeLabel[q.type]}</span>
      <span class="status-icon">${statusIcon}</span>
    </div>
    <div class="q-text">${q.text}</div>
    ${body}
  </div>`;
}

function renderMCQ(q, s) {
  let opts = '';
  q.opts.forEach((o, i) => {
    let cls = '';
    if (s) {
      if (i === q.ans) cls = 'correct-reveal';
      if (s.chosen === i) cls = s.correct ? 'selected-correct' : 'selected-wrong';
    }
    const letters = ['a','b','c','d'];
    opts += `<div class="option ${cls} ${s ? 'disabled' : ''}" onclick="${s ? '' : `chooseMCQ(${q.id},${i})`}">
      <span class="opt-letter">${letters[i]}</span>
      <span>${o}</span>
    </div>`;
  });
  let reveal = '';
  if (s && q.explain) {
    reveal = `<div class="answer-reveal show"><strong>💡 Note</strong>${q.explain}</div>`;
  }
  return `<div class="options">${opts}</div>${reveal}`;
}

function renderTF(q, s) {
  const trueClass  = s ? (q.ans === true  ? 'correct-reveal' : '') + (s.chosen === true  ? (s.correct ? ' selected-correct' : ' selected-wrong') : '') : '';
  const falseClass = s ? (q.ans === false ? 'correct-reveal' : '') + (s.chosen === false ? (s.correct ? ' selected-correct' : ' selected-wrong') : '') : '';
  const dis = s ? 'disabled' : '';
  let reveal = '';
  if (s && !s.correct && q.explain) {
    reveal = `<div class="answer-reveal show"><strong>💡 Explanation</strong>${q.explain}</div>`;
  }
  return `
  <div class="tf-buttons">
    <button class="tf-btn ${trueClass} ${dis}"  onclick="${s ? '' : `chooseTF(${q.id},true)`}">✓ True</button>
    <button class="tf-btn ${falseClass} ${dis}" onclick="${s ? '' : `chooseTF(${q.id},false)`}">✗ False</button>
  </div>
  ${reveal}`;
}

function renderEssay(q, s) {
  const revealed = s && s.essay;
  return `
  <textarea class="essay-area" id="ea${q.id}" placeholder="Type your answer here..." rows="4">${revealed ? (document.getElementById('ea'+q.id)||{}).value || '' : ''}</textarea>
  <button class="essay-submit" onclick="submitEssay(${q.id})">Show Model Answer</button>
  <div class="answer-reveal ${revealed ? 'show' : ''}" id="reveal${q.id}">
    <strong>📖 Model Answer</strong>${q.modelAnswer}
  </div>`;
}

function renderCode(q, s) {
  const codeHtml = syntaxHighlight(q.code || '');
  const revealed = s && s.essay;
  return `
  <div class="code-block">${codeHtml}</div>
  <textarea class="essay-area" id="ea${q.id}" placeholder="Your answer / trace..." rows="3"></textarea>
  <button class="essay-submit" onclick="submitEssay(${q.id})">Show Answer</button>
  <div class="answer-reveal ${revealed ? 'show' : ''}" id="reveal${q.id}">
    <strong>✅ Answer</strong><pre style="margin:0;white-space:pre-wrap;font-family:'Space Mono',monospace;font-size:12px">${q.modelAnswer}</pre>
  </div>`;
}

function syntaxHighlight(code) {
  return code
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\b(new|if|else|return|public|private|void|class|this|int|boolean|true|false|null|override|implements|extends)\b/g,'<span class="code-kw">$1</span>')
    .replace(/\b(JButton|JPanel|JTextField|JLabel|JComboBox|JCheckBox|JRadioButton|ButtonGroup|ActionListener|ItemListener|ActionEvent|ItemEvent|Font|Color|GridBagLayout|GridBagConstraints|CardLayout|BoxLayout|FlowLayout|Container|JFrame|JTextArea|JPasswordField)\b/g,'<span class="code-type">$1</span>')
    .replace(/"([^"]*)"/g,'<span class="code-str">"$1"</span>')
    .replace(/\/\/.*/g,'<span class="code-cmt">$&</span>')
    .replace(/\b(\d+)\b/g,'<span class="code-num">$1</span>');
}

// ═══════════════════════════════════════════════════════
//  INTERACTION
// ═══════════════════════════════════════════════════════
function chooseMCQ(id, chosen) {
  const q = QUESTIONS.find(x => x.id === id);
  if (!q) return;
  const correct = chosen === q.ans;
  state.answers[id] = { correct, chosen, essay:false };
  rerenderCard(q);
  updateScoreBar();
}

function chooseTF(id, chosen) {
  const q = QUESTIONS.find(x => x.id === id);
  if (!q) return;
  const correct = chosen === q.ans;
  state.answers[id] = { correct, chosen, essay:false };
  rerenderCard(q);
  updateScoreBar();
}

function submitEssay(id) {
  state.answers[id] = { correct:false, essay:true };
  const revEl = document.getElementById('reveal'+id);
  if (revEl) revEl.classList.add('show');
  const card = document.getElementById('card'+id);
  if (card) { card.classList.remove('answered-correct','answered-wrong'); card.classList.add('answered-essay'); }
  const metaIcons = card.querySelectorAll('.status-icon');
  metaIcons.forEach(el => el.textContent = '📝');
  updateScoreBar();
}

function rerenderCard(q) {
  const card = document.getElementById('card'+q.id);
  if (!card) return;
  const col = LECColors[q.lec] || '#4f9eff';
  card.outerHTML = renderCard(q, col);
}

// ═══════════════════════════════════════════════════════
//  SCORE BAR
// ═══════════════════════════════════════════════════════
function updateScoreBar() {
  const qs = filteredQs();
  let correct=0, wrong=0, essay=0;
  qs.forEach(q => {
    const s = state.answers[q.id];
    if (!s) return;
    if (s.essay) essay++;
    else if (s.correct) correct++;
    else wrong++;
  });
  const total = qs.length;
  const answered = correct + wrong + essay;

  document.getElementById('correctCount').textContent = correct;
  document.getElementById('wrongCount').textContent = wrong;
  document.getElementById('essayCount').textContent = essay;
  document.getElementById('progressFill').style.width = total ? ((answered/total)*100)+'%' : '0%';
  document.getElementById('progressText').textContent = `${answered} / ${total}`;
}

// ═══════════════════════════════════════════════════════
//  RESET
// ═══════════════════════════════════════════════════════
function resetAll() {
  if (!confirm('Reset all answers?')) return;
  state.answers = {};
  render();
}

// ═══════════════════════════════════════════════════════
//  SCORE MODAL
// ═══════════════════════════════════════════════════════
function showScore() {
  const qs = filteredQs().filter(q => q.type==='mcq' || q.type==='tf');
  let correct=0, total=qs.length;
  qs.forEach(q => { if (state.answers[q.id]?.correct) correct++; });
  const pct = total ? Math.round((correct/total)*100) : 0;
  let grade, gradeColor;
  if (pct>=90){grade='Excellent A+';gradeColor='#22c55e';}
  else if (pct>=80){grade='Very Good A';gradeColor='#22c55e';}
  else if (pct>=70){grade='Good B';gradeColor='#4f9eff';}
  else if (pct>=60){grade='Pass C';gradeColor='#f59e0b';}
  else{grade='Needs Review';gradeColor='#ef4444';}
  document.getElementById('modalScore').textContent = pct+'%';
  document.getElementById('modalScore').style.color = gradeColor;
  document.getElementById('modalGrade').textContent = grade;
  document.getElementById('modalGrade').style.color = gradeColor;
  document.getElementById('modalSub').textContent = `${correct} correct out of ${total} MCQ/T-F questions`;
  document.getElementById('modalOverlay').classList.add('show');
}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
render();
</script>
</body>
</html>
