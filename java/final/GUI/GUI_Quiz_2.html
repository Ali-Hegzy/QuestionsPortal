<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Java GUI Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1e;
    --surface: #111827;
    --surface2: #1a2235;
    --surface3: #222d42;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.12);
    --text: #e2e8f7;
    --text2: #8892b0;
    --text3: #4a5580;
    --accent: #38bdf8;
    --accent2: #0284c7;
    --green: #34d399;
    --red: #f87171;
    --amber: #fbbf24;
    --purple: #a78bfa;
    --easy: #34d399;
    --medium: #fbbf24;
    --hard: #f87171;
    --radius: 14px;
    --radius-sm: 9px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(56,189,248,0.05) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(167,139,250,0.05) 0%, transparent 50%);
    pointer-events:none; z-index:0;
  }
  body::after {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(56,189,248,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(56,189,248,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events:none; z-index:0;
  }

  .app { position:relative; z-index:1; max-width:920px; margin:0 auto; padding:2rem 1.5rem 5rem; }

  /* HEADER */
  header { text-align:center; padding:3rem 0 2.5rem; }
  .logo-badge {
    display:inline-flex; align-items:center; gap:8px;
    background:rgba(56,189,248,0.1); border:1px solid rgba(56,189,248,0.25);
    border-radius:100px; padding:6px 18px; margin-bottom:1.5rem;
  }
  .logo-dot { width:7px; height:7px; border-radius:50%; background:var(--accent); animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.75)} }
  .logo-badge span { font-size:11px; font-weight:700; color:var(--accent); letter-spacing:.1em; text-transform:uppercase; }
  header h1 { font-family:'Space Mono',monospace; font-size:clamp(1.8rem,4vw,2.8rem); font-weight:700; letter-spacing:-1px; margin-bottom:.4rem; }
  header h1 span { color:var(--accent); }
  header p { color:var(--text2); font-size:.92rem; }

  /* HOME */
  .section-label {
    font-family:'Space Mono',monospace; font-size:.68rem; font-weight:700;
    letter-spacing:.16em; text-transform:uppercase; color:var(--text3);
    margin-bottom:.9rem; display:flex; align-items:center; gap:10px;
  }
  .section-label::after { content:''; flex:1; height:1px; background:var(--border); }

  .cat-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(148px,1fr)); gap:9px; margin-bottom:2rem; }
  .filter-chip {
    padding:10px 12px; border-radius:var(--radius-sm); border:1px solid var(--border2);
    background:var(--surface); color:var(--text2); font-size:.8rem; font-weight:500;
    cursor:pointer; transition:all .15s; text-align:center; user-select:none;
  }
  .filter-chip .chip-icon { font-size:1.05rem; display:block; margin-bottom:3px; }
  .filter-chip:hover { border-color:var(--accent); color:var(--text); }
  .filter-chip.active { border-color:var(--accent); background:rgba(56,189,248,0.1); color:var(--text); box-shadow:0 0 0 1px var(--accent); }

  .pill-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:2rem; }
  .diff-pill {
    padding:6px 18px; border-radius:100px; border:1px solid var(--border2);
    background:var(--surface); color:var(--text2); font-size:.8rem; font-weight:600;
    cursor:pointer; transition:all .15s;
  }
  .diff-pill[data-diff="easy"].active { border-color:var(--easy); background:rgba(52,211,153,.1); color:var(--easy); }
  .diff-pill[data-diff="medium"].active { border-color:var(--amber); background:rgba(251,191,36,.1); color:var(--amber); }
  .diff-pill[data-diff="hard"].active { border-color:var(--red); background:rgba(248,113,113,.1); color:var(--red); }

  .type-pill {
    padding:6px 18px; border-radius:100px; border:1px solid var(--border2);
    background:var(--surface); color:var(--text2); font-size:.8rem; font-weight:500;
    cursor:pointer; transition:all .15s;
  }
  .type-pill.active { border-color:var(--purple); background:rgba(167,139,250,.1); color:var(--purple); }

  .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:11px; margin-bottom:2.5rem; }
  .stat-card {
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:.9rem 1.1rem;
  }
  .stat-card .s-label { font-size:.68rem; color:var(--text3); text-transform:uppercase; letter-spacing:.1em; margin-bottom:3px; }
  .stat-card .s-val { font-family:'Space Mono',monospace; font-size:1.45rem; font-weight:700; color:var(--text); }
  .stat-card .s-sub { font-size:.72rem; color:var(--text2); margin-top:1px; }

  .start-btn {
    width:100%; padding:15px; border-radius:var(--radius); border:none;
    background:linear-gradient(135deg, #38bdf8 0%, #0284c7 100%);
    color:#fff; font-family:'Sora',sans-serif; font-size:.98rem; font-weight:700;
    cursor:pointer; transition:all .2s; letter-spacing:.03em;
  }
  .start-btn:hover { transform:translateY(-2px); box-shadow:0 12px 36px rgba(56,189,248,.35); }
  .start-btn:active { transform:translateY(0); }
  .start-btn:disabled { opacity:.4; cursor:not-allowed; transform:none; box-shadow:none; }

  /* QUIZ */
  .quiz-section { display:none; }
  .quiz-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; gap:12px; }
  .q-meta { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .q-num { font-family:'Space Mono',monospace; font-size:.82rem; color:var(--text2); }
  .diff-badge { padding:3px 10px; border-radius:100px; font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.07em; }
  .diff-badge.easy { background:rgba(52,211,153,.15); color:var(--easy); }
  .diff-badge.medium { background:rgba(251,191,36,.15); color:var(--amber); }
  .diff-badge.hard { background:rgba(248,113,113,.15); color:var(--red); }
  .cat-tag { padding:3px 10px; border-radius:100px; font-size:.7rem; font-weight:500; background:rgba(56,189,248,.1); color:var(--accent); border:1px solid rgba(56,189,248,.2); }
  .progress-wrap { background:var(--surface2); border-radius:100px; height:4px; flex:1; }
  .progress-bar { height:4px; border-radius:100px; background:linear-gradient(90deg,var(--accent),var(--purple)); transition:width .4s ease; }

  .question-card {
    background:var(--surface); border:1px solid var(--border2); border-radius:var(--radius);
    padding:1.8rem; margin-bottom:1.1rem; animation:fadeUp .3s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .q-type-label { font-size:.68rem; font-weight:700; letter-spacing:.13em; text-transform:uppercase; color:var(--text3); margin-bottom:.75rem; }
  .q-text { font-size:1rem; line-height:1.7; color:var(--text); }
  code, .code-block {
    font-family:'Space Mono',monospace; background:var(--surface3); border:1px solid var(--border);
    border-radius:6px; padding:2px 6px; font-size:.87em; color:#93c5fd;
  }
  .code-block { display:block; padding:13px 15px; margin:.9rem 0; font-size:.81rem; line-height:1.65; white-space:pre; overflow-x:auto; }

  .options-grid { display:grid; gap:9px; margin-top:1.4rem; }
  .option-btn {
    display:flex; align-items:flex-start; gap:13px;
    padding:13px 16px; border-radius:var(--radius-sm);
    border:1px solid var(--border2); background:var(--surface2);
    color:var(--text); font-size:.9rem; font-family:'Sora',sans-serif;
    cursor:pointer; transition:all .14s; text-align:left; line-height:1.5;
  }
  .option-btn:hover:not(:disabled) { border-color:var(--accent); background:rgba(56,189,248,.07); }
  .option-letter {
    flex-shrink:0; width:25px; height:25px; border-radius:50%;
    background:var(--surface3); border:1px solid var(--border2);
    display:flex; align-items:center; justify-content:center;
    font-family:'Space Mono',monospace; font-size:.72rem; font-weight:700;
    color:var(--text2); transition:all .14s;
  }
  .option-btn.selected { border-color:var(--accent); background:rgba(56,189,248,.1); }
  .option-btn.selected .option-letter { background:var(--accent); border-color:var(--accent); color:#fff; }
  .option-btn.correct { border-color:var(--green)!important; background:rgba(52,211,153,.09)!important; }
  .option-btn.correct .option-letter { background:var(--green)!important; border-color:var(--green)!important; color:#fff!important; }
  .option-btn.wrong { border-color:var(--red)!important; background:rgba(248,113,113,.07)!important; }
  .option-btn.wrong .option-letter { background:var(--red)!important; border-color:var(--red)!important; color:#fff!important; }
  .option-btn:disabled { cursor:default; }

  .tf-grid { display:grid; grid-template-columns:1fr 1fr; gap:11px; margin-top:1.4rem; }
  .tf-btn {
    padding:18px; border-radius:var(--radius-sm); border:1px solid var(--border2);
    background:var(--surface2); color:var(--text); font-size:.98rem; font-weight:600;
    cursor:pointer; transition:all .14s; font-family:'Sora',sans-serif;
  }
  .tf-btn.true-btn:hover:not(:disabled) { border-color:var(--green); background:rgba(52,211,153,.07); }
  .tf-btn.false-btn:hover:not(:disabled) { border-color:var(--red); background:rgba(248,113,113,.07); }
  .tf-btn.correct { border-color:var(--green)!important; background:rgba(52,211,153,.12)!important; color:var(--green)!important; }
  .tf-btn.wrong { border-color:var(--red)!important; background:rgba(248,113,113,.07)!important; color:var(--red)!important; }
  .tf-btn:disabled { cursor:default; }

  .trace-area {
    width:100%; margin-top:1.4rem; padding:13px 15px;
    background:var(--surface3); border:1px solid var(--border2); border-radius:var(--radius-sm);
    color:var(--text); font-family:'Space Mono',monospace; font-size:.83rem; line-height:1.7;
    resize:vertical; min-height:110px; transition:border-color .15s;
  }
  .trace-area:focus { outline:none; border-color:var(--accent); }
  .reveal-btn {
    margin-top:.8rem; padding:9px 20px; border-radius:var(--radius-sm);
    border:1px solid var(--border2); background:transparent;
    color:var(--text2); font-family:'Sora',sans-serif; font-size:.85rem; font-weight:500;
    cursor:pointer; transition:all .14s;
  }
  .reveal-btn:hover { border-color:var(--accent); color:var(--accent); }
  .answer-reveal {
    display:none; margin-top:.9rem; padding:15px 16px;
    background:rgba(52,211,153,.05); border:1px solid rgba(52,211,153,.22);
    border-radius:var(--radius-sm); font-size:.88rem; line-height:1.65; color:var(--green);
  }
  .answer-reveal.show { display:block; animation:fadeUp .22s ease; }

  .feedback-bar {
    display:none; align-items:flex-start; gap:13px; padding:15px 18px;
    border-radius:var(--radius-sm); margin-top:.9rem; animation:fadeUp .22s ease;
  }
  .feedback-bar.show { display:flex; }
  .feedback-bar.correct-fb { background:rgba(52,211,153,.07); border:1px solid rgba(52,211,153,.22); }
  .feedback-bar.wrong-fb { background:rgba(248,113,113,.05); border:1px solid rgba(248,113,113,.18); }
  .fb-icon { font-size:1.15rem; flex-shrink:0; margin-top:1px; }
  .fb-text { font-size:.87rem; line-height:1.55; }
  .fb-text strong { display:block; margin-bottom:3px; }
  .feedback-bar.correct-fb .fb-text strong { color:var(--green); }
  .feedback-bar.wrong-fb .fb-text strong { color:var(--red); }

  .quiz-nav { display:flex; justify-content:space-between; align-items:center; gap:11px; margin-top:1.4rem; }
  .nav-btn {
    padding:12px 26px; border-radius:var(--radius-sm); border:1px solid var(--border2);
    background:var(--surface); color:var(--text); font-family:'Sora',sans-serif;
    font-size:.88rem; font-weight:500; cursor:pointer; transition:all .14s;
  }
  .nav-btn:hover { border-color:var(--accent); color:var(--accent); }
  .nav-btn.primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); border-color:transparent; color:#fff; font-weight:700; }
  .nav-btn.primary:hover { box-shadow:0 8px 22px rgba(56,189,248,.3); transform:translateY(-1px); }
  .nav-btn:disabled { opacity:.4; cursor:default; transform:none!important; box-shadow:none!important; }

  /* RESULTS */
  .results-section { display:none; animation:fadeUp .4s ease; }
  .score-hero {
    text-align:center; padding:2.5rem 2rem;
    background:var(--surface); border:1px solid var(--border2);
    border-radius:var(--radius); margin-bottom:1.4rem; position:relative; overflow:hidden;
  }
  .score-hero::before {
    content:''; position:absolute; inset:0;
    background:radial-gradient(ellipse at 50% -10%, rgba(56,189,248,.12), transparent 65%);
  }
  .score-ring {
    width:120px; height:120px; border-radius:50%; margin:0 auto 1.3rem;
    display:flex; align-items:center; justify-content:center; position:relative; z-index:1;
    background:conic-gradient(var(--accent) calc(var(--pct) * 3.6deg), var(--surface3) 0deg);
  }
  .score-ring-inner {
    width:94px; height:94px; border-radius:50%; background:var(--surface);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .score-pct { font-family:'Space Mono',monospace; font-size:1.4rem; font-weight:700; color:var(--text); }
  .score-lbl { font-size:.68rem; color:var(--text2); }
  .score-title { font-family:'Space Mono',monospace; font-size:1.3rem; font-weight:700; margin-bottom:.4rem; position:relative; z-index:1; }
  .score-msg { color:var(--text2); font-size:.88rem; position:relative; z-index:1; }

  .results-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:9px; margin-bottom:1.4rem; }
  .res-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:.9rem 1.1rem; text-align:center; }
  .res-card .r-val { font-family:'Space Mono',monospace; font-size:1.5rem; font-weight:700; }
  .res-card .r-label { font-size:.72rem; color:var(--text2); margin-top:3px; }
  .res-card.green .r-val { color:var(--green); }
  .res-card.red .r-val { color:var(--red); }
  .res-card.amber .r-val { color:var(--amber); }

  .breakdown { background:var(--surface); border:1px solid var(--border2); border-radius:var(--radius); padding:1.4rem; margin-bottom:1.4rem; }
  .breakdown h3 { font-family:'Space Mono',monospace; font-size:.72rem; text-transform:uppercase; letter-spacing:.12em; color:var(--text3); margin-bottom:.9rem; }
  .cat-row { display:flex; align-items:center; gap:11px; padding:7px 0; border-bottom:1px solid var(--border); }
  .cat-row:last-child { border-bottom:none; }
  .cat-name { flex:1; font-size:.86rem; color:var(--text2); }
  .cat-bar-wrap { flex:2; background:var(--surface3); border-radius:100px; height:5px; }
  .cat-bar { height:5px; border-radius:100px; transition:width .5s ease; }
  .cat-score { font-family:'Space Mono',monospace; font-size:.78rem; color:var(--text); min-width:38px; text-align:right; }

  .results-actions { display:flex; gap:9px; }
  .results-actions .nav-btn { flex:1; padding:13px; font-size:.9rem; text-align:center; }

  @media(max-width:520px) {
    .stats-row { grid-template-columns:1fr 1fr; }
    .tf-grid { grid-template-columns:1fr; }
    .results-actions { flex-direction:column; }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo-badge"><div class="logo-dot"></div><span>CS Faculty · Java GUI</span></div>
    <h1>Java <span>GUI</span> Quiz</h1>
    <p>Swing · AWT · Event Handling · Layout Managers</p>
  </header>

  <!-- HOME -->
  <div id="homeSection">
    <div class="section-label">Choose Topics</div>
    <div class="cat-grid" id="catGrid"></div>

    <div class="section-label">Difficulty</div>
    <div class="pill-row">
      <button class="diff-pill active" data-diff="easy">🟢 Easy</button>
      <button class="diff-pill active" data-diff="medium">🟡 Medium</button>
      <button class="diff-pill active" data-diff="hard">🔴 Hard</button>
    </div>

    <div class="section-label">Question Type</div>
    <div class="pill-row">
      <button class="type-pill active" data-type="mcq">Multiple Choice</button>
      <button class="type-pill active" data-type="tf">True / False</button>
      <button class="type-pill active" data-type="trace">Code / Essay</button>
    </div>

    <div class="stats-row">
      <div class="stat-card"><div class="s-label">Available</div><div class="s-val" id="qCount">0</div><div class="s-sub">questions</div></div>
      <div class="stat-card"><div class="s-label">Topics</div><div class="s-val" id="catCount">0</div><div class="s-sub">categories</div></div>
      <div class="stat-card"><div class="s-label">Est. Time</div><div class="s-val" id="timeEst">0m</div><div class="s-sub">minutes</div></div>
    </div>
    <button class="start-btn" id="startBtn" onclick="startQuiz()">Start Quiz →</button>
  </div>

  <!-- QUIZ -->
  <div class="quiz-section" id="quizSection">
    <div class="quiz-header">
      <div class="q-meta">
        <span class="q-num" id="qNumLabel">Q1 / 20</span>
        <span class="diff-badge" id="qDiffBadge">Easy</span>
        <span class="cat-tag" id="qCatTag">Events</span>
      </div>
      <div class="progress-wrap" style="flex:1;max-width:220px">
        <div class="progress-bar" id="progressBar" style="width:0%"></div>
      </div>
    </div>
    <div class="question-card" id="questionCard"></div>
    <div class="feedback-bar" id="feedbackBar">
      <span class="fb-icon" id="fbIcon"></span>
      <div class="fb-text"><strong id="fbTitle"></strong><span id="fbDetail"></span></div>
    </div>
    <div class="quiz-nav">
      <button class="nav-btn" id="skipBtn" onclick="skipQ()">Skip</button>
      <button class="nav-btn primary" id="nextBtn" onclick="nextQ()" disabled>Next →</button>
    </div>
  </div>

  <!-- RESULTS -->
  <div class="results-section" id="resultsSection">
    <div class="score-hero">
      <div class="score-ring" id="scoreRing">
        <div class="score-ring-inner">
          <span class="score-pct" id="scorePct">0%</span>
          <span class="score-lbl">Score</span>
        </div>
      </div>
      <div class="score-title" id="scoreTitle"></div>
      <div class="score-msg" id="scoreMsg"></div>
    </div>
    <div class="results-grid">
      <div class="res-card green"><div class="r-val" id="rCorrect">0</div><div class="r-label">Correct</div></div>
      <div class="res-card red"><div class="r-val" id="rWrong">0</div><div class="r-label">Wrong</div></div>
      <div class="res-card amber"><div class="r-val" id="rSkipped">0</div><div class="r-label">Skipped</div></div>
      <div class="res-card"><div class="r-val" id="rTotal">0</div><div class="r-label">Total</div></div>
    </div>
    <div class="breakdown" id="catBreakdown"></div>
    <div class="results-actions">
      <button class="nav-btn" onclick="goHome()">← Home</button>
      <button class="nav-btn primary" id="reviewBtn" onclick="reviewWrong()">Review Wrong ↗</button>
    </div>
  </div>

</div>
<script>
const CATS = {
  "Swing Basics":       "🖼️",
  "AWT & Packages":     "📦",
  "Event Handling":     "⚡",
  "Buttons & State":    "🔘",
  "Text Components":    "✏️",
  "Layout Managers":    "📐",
  "Mouse Events":       "🖱️",
  "Combo & Lists":      "📋",
  "JFrame & Dialogs":   "🪟",
  "Code Tracing":       "🔍"
};

const QS = [
  // ── SWING BASICS ──────────────────────────────────────────────
  {id:1,type:'mcq',cat:'Swing Basics',diff:'easy',
   q:'Which package contains Java Swing GUI components?',
   opts:['java.awt','javax.swing','java.gui','java.swing'],ans:1,
   ex:'Swing lives in <code>javax.swing</code>; AWT lives in <code>java.awt</code>.'},

  {id:2,type:'mcq',cat:'Swing Basics',diff:'easy',
   q:'Which class provides the method <code>paint()</code> for drawing a component on screen?',
   opts:['JComponent','Container','Component','JPanel'],ans:2,
   ex:'<code>Component</code> (in java.awt) defines <code>paint()</code>. All GUI classes ultimately extend it.'},

  {id:3,type:'mcq',cat:'Swing Basics',diff:'medium',
   q:'Which statement about Swing is TRUE?',
   opts:['Swing components use native OS widgets','Swing is part of java.awt','Swing components are lightweight and written in pure Java','Swing has no event model'],ans:2,
   ex:'Swing components are lightweight — they render themselves in Java, not using native OS widgets.'},

  {id:4,type:'mcq',cat:'Swing Basics',diff:'medium',
   q:'Which Swing class provides pluggable look-and-feel, mnemonics, and common event-handling?',
   opts:['Component','Container','JComponent','JFrame'],ans:2,
   ex:'<code>JComponent</code> is the root of all Swing widgets and provides pluggable look-and-feel support.'},

  {id:5,type:'mcq',cat:'Swing Basics',diff:'easy',
   q:'Which method is used to add a component to a Container?',
   opts:['insert()','place()','add()','append()'],ans:2,

let selCats = new Set(Object.keys(CATS));
let selDiffs = new Set(['easy','medium','hard']);
let selTypes = new Set(['mcq','tf','trace']);
let quiz=[], idx=0, score=0, skipped=0, answered=0;

// ── Init ───────────────────────────────────────────────────────
function initCats() {
  const g = document.getElementById('catGrid'); g.innerHTML='';
  Object.entries(CATS).forEach(([name,icon])=>{
    const b=document.createElement('button');
    b.className='filter-chip active'; b.dataset.cat=name;
    b.innerHTML=`<span class="chip-icon">${icon}</span>${name}`;
    b.onclick=()=>toggleCat(b,name);
    g.appendChild(b);
  });
}
function toggleCat(b,n){
  if(selCats.has(n)){if(selCats.size===1)return;selCats.delete(n);b.classList.remove('active');}
  else{selCats.add(n);b.classList.add('active');}
  updateStats();
}
document.querySelectorAll('.diff-pill').forEach(b=>{
  b.onclick=()=>{
    const d=b.dataset.diff;
    if(selDiffs.has(d)){if(selDiffs.size===1)return;selDiffs.delete(d);b.classList.remove('active');}
    else{selDiffs.add(d);b.classList.add('active');}
    updateStats();
  };
});
document.querySelectorAll('.type-pill').forEach(b=>{
  b.onclick=()=>{
    const t=b.dataset.type;
    if(selTypes.has(t)){if(selTypes.size===1)return;selTypes.delete(t);b.classList.remove('active');}
    else{selTypes.add(t);b.classList.add('active');}
    updateStats();
  };
});
function filtered(){return QS.filter(q=>selCats.has(q.cat)&&selDiffs.has(q.diff)&&selTypes.has(q.type));}
function updateStats(){
  const qs=filtered();
  document.getElementById('qCount').textContent=qs.length;
  document.getElementById('catCount').textContent=new Set(qs.map(q=>q.cat)).size;
  document.getElementById('timeEst').textContent=Math.ceil(qs.length*1.2)+'m';
  document.getElementById('startBtn').disabled=qs.length===0;
}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

function startQuiz(useWrong=false){
  reviewMode=useWrong;
  quiz=shuffle(useWrong?wrong:filtered());
  idx=0;score=0;skipped=0;answered=0;catScores={};wrong=[];answered_ids=new Set();
  quiz.forEach(q=>{if(!catScores[q.cat])catScores[q.cat]={c:0,t:0};catScores[q.cat].t++;});
  document.getElementById('homeSection').style.display='none';
  document.getElementById('resultsSection').style.display='none';
  document.getElementById('quizSection').style.display='block';
  renderQ();
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderQ(){
  const q=quiz[idx]; const total=quiz.length;
  document.getElementById('qNumLabel').textContent=`Q${idx+1} / ${total}`;
  document.getElementById('progressBar').style.width=`${(idx/total)*100}%`;
  const db=document.getElementById('qDiffBadge');
  db.textContent=q.diff[0].toUpperCase()+q.diff.slice(1); db.className=`diff-badge ${q.diff}`;
  document.getElementById('qCatTag').textContent=q.cat;

  let html=`<div class="q-type-label">${q.type==='mcq'?'Multiple Choice':q.type==='tf'?'True / False':'Code Trace / Essay'}</div>`;
  html+=`<div class="q-text">${q.q}</div>`;
  if(q.code) html+=`<code class="code-block">${esc(q.code)}</code>`;

  if(q.type==='mcq'){
    html+='<div class="options-grid">';
    ['A','B','C','D'].forEach((l,i)=>{
      html+=`<button class="option-btn" onclick="pickMCQ(this,${i})" data-idx="${i}">
        <span class="option-letter">${l}</span><span>${q.opts[i]}</span></button>`;
    });
    html+='</div>';
  } else if(q.type==='tf'){
    html+=`<div class="tf-grid">
      <button class="tf-btn true-btn" onclick="pickTF(this,true)">✓ TRUE</button>
      <button class="tf-btn false-btn" onclick="pickTF(this,false)">✗ FALSE</button>
    </div>`;
  } else {
    html+=`<textarea class="trace-area" id="traceInput" placeholder="Write your answer here..."></textarea>`;
    html+=`<button class="reveal-btn" onclick="revealTrace()">Reveal Answer</button>`;
    html+=`<div class="answer-reveal" id="ansRev"><strong>Model Answer:</strong><br>
      <code class="code-block" style="margin-top:.5rem">${esc(q.ans)}</code>
      <p style="margin-top:.5rem;font-size:.84rem">${q.ex}</p></div>`;
  }
  document.getElementById('questionCard').innerHTML=html;
  clearFB();
  document.getElementById('skipBtn').style.display=q.type==='trace'?'none':'';
  document.getElementById('nextBtn').textContent=idx===quiz.length-1?'Finish ✓':'Next →';
  document.getElementById('nextBtn').disabled=q.type!=='trace';
}

function pickMCQ(btn,i){
  const q=quiz[idx]; if(answered_ids.has(q.id))return;
  answered_ids.add(q.id);
  document.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
  const ok=i===q.ans;
  btn.classList.add(ok?'correct':'wrong');
  if(!ok){document.querySelectorAll('.option-btn')[q.ans].classList.add('correct');wrong.push(q);}
  else{score++;catScores[q.cat].c++;}
  answered++;
  showFB(ok,q.ex);
  document.getElementById('nextBtn').disabled=false;
}
function pickTF(btn,v){
  const q=quiz[idx]; if(answered_ids.has(q.id))return;
  answered_ids.add(q.id);
  document.querySelectorAll('.tf-btn').forEach(b=>b.disabled=true);
  const ok=v===q.ans;
  btn.classList.add(ok?'correct':'wrong');
  if(!ok){
    document.querySelectorAll('.tf-btn').forEach(b=>{
      if((b.classList.contains('true-btn')&&q.ans===true)||(b.classList.contains('false-btn')&&q.ans===false))b.classList.add('correct');
    });
    wrong.push(q);
  } else{score++;catScores[q.cat].c++;}
  answered++;
  showFB(ok,q.ex);
  document.getElementById('nextBtn').disabled=false;
}
function revealTrace(){
  const r=document.getElementById('ansRev'); if(r)r.classList.add('show');
  document.getElementById('nextBtn').disabled=false;
}
function showFB(ok,ex){
  const bar=document.getElementById('feedbackBar');
  bar.className=`feedback-bar show ${ok?'correct-fb':'wrong-fb'}`;
  document.getElementById('fbIcon').textContent=ok?'✓':'✗';
  document.getElementById('fbTitle').textContent=ok?'Correct!':'Incorrect';
  document.getElementById('fbDetail').innerHTML=ex||'';
}
function clearFB(){document.getElementById('feedbackBar').className='feedback-bar';}
function skipQ(){const q=quiz[idx];if(!answered_ids.has(q.id)){skipped++;wrong.push(q);}nextQ();}
function nextQ(){if(idx>=quiz.length-1)showResults();else{idx++;renderQ();}}

function showResults(){
  document.getElementById('quizSection').style.display='none';
  document.getElementById('resultsSection').style.display='block';
  const total=quiz.length, pct=total>0?Math.round((score/total)*100):0;
  document.getElementById('scorePct').textContent=pct+'%';
  document.getElementById('scoreRing').style.setProperty('--pct',pct);
  document.getElementById('rCorrect').textContent=score;
  document.getElementById('rWrong').textContent=total-score-skipped;
  document.getElementById('rSkipped').textContent=skipped;
  document.getElementById('rTotal').textContent=total;
  let t,m;
  if(pct>=90){t='🎉 Excellent!';m='Outstanding — you have mastered Java GUI programming!';}
  else if(pct>=75){t='👍 Great Job!';m='Solid understanding. Review the questions you missed.';}
  else if(pct>=60){t='📖 Almost There!';m='Good foundation. A bit more study will get you there.';}
  else{t='💡 Keep Practicing!';m='Review the material and try again — persistence pays off!';}
  document.getElementById('scoreTitle').textContent=t;
  document.getElementById('scoreMsg').textContent=m;
  let bHTML='<h3>Performance by Category</h3>';
  Object.entries(catScores).forEach(([cat,d])=>{
    const p=d.t>0?Math.round((d.c/d.t)*100):0;
    const col=p>=70?'var(--green)':p>=50?'var(--amber)':'var(--red)';
    bHTML+=`<div class="cat-row">
      <span class="cat-name">${cat}</span>
      <div class="cat-bar-wrap"><div class="cat-bar" style="width:${p}%;background:${col}"></div></div>
      <span class="cat-score">${d.c}/${d.t}</span></div>`;
  });
  document.getElementById('catBreakdown').innerHTML=bHTML;
  document.getElementById('reviewBtn').style.display=wrong.length>0?'':'none';
}
function goHome(){
  document.getElementById('resultsSection').style.display='none';
  document.getElementById('homeSection').style.display='block';
  updateStats();
}
function reviewWrong(){if(wrong.length>0)startQuiz(true);}

initCats(); updateStats();
</script>
</body>
</html>
